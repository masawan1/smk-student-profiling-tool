<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK Potensi - Random Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-option { 
            padding: 15px; text-align: left; border-radius: 12px; 
            transition: 0.3s; border: 2px solid #e9ecef; margin-bottom: 10px; width: 100%;
            background: white;
        }
        .btn-option:hover { background-color: #e7f1ff; border-color: #0d6efd; transform: translateY(-2px); }
        .hidden { display: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">SMK POTENSI</h2>
                <p class="text-muted">Assessment Logika & Karakter (Mode Acak)</p>
            </div>

            <div class="card p-4 animate__animated animate__fadeIn">
                <!-- FORM IDENTITAS -->
                <div id="setup-area">
                    <h5 class="mb-3 text-center">Identitas Siswa</h5>
                    <input type="text" id="student-name" class="form-control mb-3" placeholder="Nama Lengkap">
                    <select id="student-class" class="form-select mb-4">
                        <option value="">Pilih Kelas...</option>
                        <option value="10-PPLG">10 PPLG</option>
                        <option value="10-DKV">10 DKV</option>
                        <option value="10-Broadcasting">10 Broadcasting</option>
                    </select>
                    <button id="btn-start" class="btn btn-primary btn-lg w-100" onclick="startQuiz()">Mulai Tes</button>
                </div>

                <!-- AREA TEST -->
                <div id="question-area" class="hidden">
                    <div class="progress mb-3" style="height: 10px;">
                        <div id="progress-bar" class="progress-bar bg-primary progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <p id="q-number" class="small text-muted"></p>
                    <h4 id="question-text" class="mb-4 fw-bold"></h4>
                    <div id="options-area" class="d-grid"></div>
                </div>

                <!-- AREA HASIL -->
                <div id="result-area" class="hidden text-center">
                    <div style="font-size: 60px;">🎯</div>
                    <h4 class="mt-3">Tes Selesai!</h4>
                    <div id="loading-status" class="alert alert-info mt-3">
                        <div class="loader"></div> Menyimpan data...
                    </div>
                    <button class="btn btn-dark w-100 mt-3" onclick="location.reload()">Selesai</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'TEMPEL_URL_WEB_APP_BAPAK_DI_SINI';
    
    let questions = []; 
    let currentIdx = 0;
    let correctIQCount = 0;
    let studentData = {};
    let userAnswers = [];

    // FUNGSI PENGACAK (Fisher-Yates Shuffle)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function startQuiz() {
        const name = document.getElementById('student-name').value;
        const sClass = document.getElementById('student-class').value;
        if(!name || !sClass) return alert("Lengkapi data!");

        document.getElementById('btn-start').innerHTML = "Mengacak Soal...";

        try {
            const response = await fetch(scriptURL);
            let rawQuestions = await response.json();

            // 1. ACAK URUTAN SOAL
            questions = shuffle(rawQuestions);

            studentData = { name, class: sClass };
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('question-area').classList.remove('hidden');
            showQuestion();
        } catch (err) { alert("Gagal memuat soal!"); }
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress-bar').style.width = `${(currentIdx / questions.length) * 100}%`;
        document.getElementById('q-number').innerText = `Soal ${currentIdx + 1} dari ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        
        const optArea = document.getElementById('options-area');
        optArea.innerHTML = "";

        // 2. ACAK URUTAN OPSI JAWABAN
        let shuffledOptions = shuffle([...q.opt.filter(o => o !== "")]);

        shuffledOptions.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "btn btn-option animate__animated animate__fadeInUp";
            btn.innerText = o;
            btn.onclick = () => nextQuestion(o);
            optArea.appendChild(btn);
        });
    }

    function nextQuestion(selected) {
        const q = questions[currentIdx];
        // Simpan jawaban asli (untuk direkap di Sheet)
        userAnswers.push(`${q.q}: ${selected}`);

        if (q.type === "IQ" && String(selected).trim() === String(q.ans).trim()) {
            correctIQCount++;
        }

        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            finalize();
        }
    }

    async function finalize() {
        document.getElementById('question-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        
        const totalIQ = questions.filter(q => q.type === "IQ").length;
        const finalScore = totalIQ > 0 ? Math.round((correctIQCount / totalIQ) * 100) : 0;

        const payload = {
            name: studentData.name,
            class: studentData.class,
            score: finalScore,
            allAnswers: userAnswers
        };

        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        document.getElementById('loading-status').innerHTML = "Data Berhasil Terkirim!";
    }
</script>
</body>
</html>
