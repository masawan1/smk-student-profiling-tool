<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK Potensi - Assessment Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; color: #333; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-option { 
            padding: 15px; text-align: left; border-radius: 12px; 
            transition: 0.3s; border: 2px solid #e9ecef; margin-bottom: 10px; width: 100%;
            background: white; font-weight: 500;
        }
        .btn-option:hover { background-color: #e7f1ff; border-color: #0d6efd; transform: translateY(-2px); }
        .progress { height: 10px; border-radius: 10px; margin-bottom: 20px; }
        .hidden { display: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">SMK POTENSI</h2>
                <p class="text-muted">Assessment Logika & Karakter Siswa</p>
            </div>

            <div class="card p-4 animate__animated animate__fadeIn">
                <!-- 1. FORM DATA DIRI (Ketik Manual) -->
                <div id="setup-area">
                    <h5 class="mb-3 text-center">Identitas Siswa</h5>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nama Lengkap</label>
                        <input type="text" id="student-name" class="form-control form-control-lg" placeholder="Masukkan nama lengkap">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Kelas</label>
                        <!-- SEKARANG JADI INPUT TEKS MANUAL -->
                        <input type="text" id="student-class" class="form-control form-control-lg" placeholder="Contoh: 10 PPLG 1">
                    </div>
                    <button id="btn-start" class="btn btn-primary btn-lg w-100" onclick="startQuiz()">Mulai Tes</button>
                </div>

                <!-- 2. AREA TEST -->
                <div id="question-area" class="hidden">
                    <div class="progress">
                        <div id="progress-bar" class="progress-bar bg-primary progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="badge bg-light text-primary border" id="q-number">Soal 1</span>
                    </div>
                    <h4 id="question-text" class="mb-4 fw-bold"></h4>
                    <div id="options-area" class="d-grid"></div>
                </div>

                <!-- 3. AREA HASIL -->
                <div id="result-area" class="hidden text-center animate__animated animate__bounceIn">
                    <div style="font-size: 60px;">🚀</div>
                    <h4 class="mt-3 fw-bold">Tes Berhasil Diselesaikan!</h4>
                    <p class="text-muted px-3 small">Data Anda sedang dikirim ke database sekolah. Silakan tunggu hingga status berubah menjadi sukses.</p>
                    
                    <div id="loading-status" class="alert alert-info py-2 mt-3">
                        <div class="loader"></div> <span class="ms-2">Mengirim data...</span>
                    </div>
                    
                    <hr>
                    <button class="btn btn-dark w-100 py-2" onclick="location.reload()">Selesai & Tutup</button>
                </div>
            </div>
            <p class="text-center mt-4 text-muted small">&copy; 2026 SMK Potensi Assessment System</p>
        </div>
    </div>
</div>

<script>
    // URL Web App Bapak (Akhiran /exec)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzWHHgkuotTgf66XLMR9JXOJkgy5RUXcR90ywscUS8at8tMH94dV0IJrgsn1euZIZtG/exec';
    
    let questions = []; 
    let currentIdx = 0;
    let correctIQCount = 0;
    let studentData = {};
    let userAnswers = [];

    // Fungsi Pengacak (Shuffle)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function startQuiz() {
        const name = document.getElementById('student-name').value.trim();
        const sClass = document.getElementById('student-class').value.trim();
        
        if(!name || !sClass) return alert("Harap isi Nama dan Kelas!");
        
        const btnStart = document.getElementById('btn-start');
        btnStart.disabled = true;
        btnStart.innerHTML = "Memuat Soal...";

        try {
            const response = await fetch(scriptURL);
            let rawData = await response.json();

            // ACAK URUTAN SOAL
            questions = shuffleArray(rawData);

            studentData = { name, class: sClass };
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('question-area').classList.remove('hidden');
            showQuestion();
        } catch (err) {
            alert("Gagal mengambil soal. Pastikan koneksi internet aktif!");
            btnStart.disabled = false;
            btnStart.innerHTML = "Mulai Tes";
        }
    }

    function showQuestion() {
        const q = questions[currentIdx];
        const progress = (currentIdx / questions.length) * 100;
        
        document.getElementById('progress-bar').style.width = `${progress}%`;
        document.getElementById('q-number').innerText = `Soal ${currentIdx + 1} dari ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        
        const optArea = document.getElementById('options-area');
        optArea.innerHTML = "";

        // ACAK URUTAN OPSI
        let options = shuffleArray([...q.opt.filter(o => o && o !== "")]);

        options.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "btn btn-option animate__animated animate__fadeInUp";
            btn.innerText = o;
            btn.onclick = () => nextQuestion(o);
            optArea.appendChild(btn);
        });
    }

    function nextQuestion(selected) {
        const q = questions[currentIdx];
        userAnswers.push(selected);

        // Cek Jawaban Benar (Hanya tipe IQ)
        if (q.type === "IQ" && String(selected).trim().toLowerCase() === String(q.ans).trim().toLowerCase()) {
            correctIQCount++;
        }

        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            submitResults();
        }
    }

    async function submitResults() {
        document.getElementById('question-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        
        const totalIQ = questions.filter(q => q.type === "IQ").length;
        const finalScore = totalIQ > 0 ? Math.round((correctIQCount / totalIQ) * 100) : 0;

        const payload = {
            name: studentData.name,
            class: studentData.class,
            score: finalScore,
            allAnswers: userAnswers
        };

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify(payload)
            });
            document.getElementById('loading-status').className = "alert alert-success py-2 mt-3";
            document.getElementById('loading-status').innerHTML = "<b>Sukses:</b> Data Berhasil Disimpan.";
        } catch (e) {
            document.getElementById('loading-status').className = "alert alert-danger py-2 mt-3";
            document.getElementById('loading-status').innerHTML = "<b>Gagal:</b> Koneksi Error.";
        }
    }
</script>
</body>
</html>
