<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK Potensi - Assessment Tool</title>
    <!-- CSS: Bootstrap + Google Fonts + Animate.css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; color: #333; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-option { 
            padding: 15px; text-align: left; border-radius: 12px; 
            transition: 0.3s; border: 2px solid #e9ecef; margin-bottom: 10px; width: 100%;
            background: white;
        }
        .btn-option:hover { background-color: #e7f1ff; border-color: #0d6efd; transform: translateY(-2px); }
        .progress { height: 8px; border-radius: 10px; margin-bottom: 20px; }
        .hidden { display: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Header -->
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">SMK POTENSI</h2>
                <p class="text-muted">Assessment Logika & Karakter Siswa</p>
            </div>

            <div class="card p-4 animate__animated animate__fadeIn">
                <!-- 1. FORM DATA DIRI -->
                <div id="setup-area">
                    <h5 class="mb-3 text-center">Identitas Siswa</h5>
                    <input type="text" id="student-name" class="form-control form-control-lg mb-3" placeholder="Nama Lengkap Siswa">
                    <select id="student-class" class="form-select form-select-lg mb-4">
                        <option value="">Pilih Kelas...</option>
                        <option value="10-PPLG">10 PPLG</option>
                        <option value="10-DKV">10 DKV</option>
                        <option value="10-Broadcasting">10 Broadcasting</option>
                        <option value="10-TJKT">10 TJKT</option>
                    </select>
                    <button class="btn btn-primary btn-lg w-100" onclick="startQuiz()">Mulai Tes</button>
                </div>

                <!-- 2. AREA TEST -->
                <div id="question-area" class="hidden">
                    <div class="progress">
                        <div id="progress-bar" class="progress-bar bg-primary progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <p class="text-muted small">Soal <span id="q-number">1</span></p>
                    <h4 id="question-text" class="mb-4 fw-600"></h4>
                    <div id="options-area" class="d-grid"></div>
                </div>

                <!-- 3. AREA HASIL -->
                <div id="result-area" class="hidden text-center animate__animated animate__bounceIn">
                    <div style="font-size: 50px;">✅</div>
                    <h4 class="mt-3">Tes Berhasil Diselesaikan!</h4>
                    <p class="text-muted px-3">Terima kasih atas partisipasinya. Data Anda telah kami kirimkan ke sistem sekolah untuk dianalisis oleh Bapak/Ibu Guru.</p>
                    <div id="loading-status" class="mt-3">
                        <div class="loader"></div> <span class="ms-2">Menyimpan ke Database...</span>
                    </div>
                    <hr>
                    <button class="btn btn-outline-secondary mt-2" onclick="location.reload()">Selesai & Tutup</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- DATABASE SOAL (Silakan Tambah/Ubah Di Sini) ---
    const questions = [
        { q: "Pola angka: 2, 4, 8, 16, ... Angka berikutnya adalah?", opt: ["24", "30", "32", "36"], ans: "32", type: "IQ" },
        { q: "Jika semua guru adalah pendidik, dan sebagian pendidik adalah penulis, maka semua guru adalah penulis.", opt: ["Benar", "Salah"], ans: "Salah", type: "IQ" },
        { q: "Saya lebih senang bekerja sendiri dalam menyelesaikan tugas koding/desain.", opt: ["Sangat Setuju", "Setuju", "Ragu-ragu", "Tidak Setuju"], type: "Karakter" },
        { q: "Manakah yang tidak termasuk kelompoknya?", opt: ["Mouse", "Keyboard", "Monitor", "Meja"], ans: "Meja", type: "IQ" },
        { q: "Saya merasa tertantang saat menemukan error pada program yang saya buat.", opt: ["Sangat Setuju", "Setuju", "Ragu-ragu", "Tidak Setuju"], type: "Karakter" }
    ];

    let currentIdx = 0;
    let scoreIQ = 0;
    let studentData = {};
    let userAnswers = []; // Untuk menyimpan jawaban per soal

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        const sClass = document.getElementById('student-class').value;
        if(!name || !sClass) return alert("Harap isi Nama dan Kelas terlebih dahulu!");
        
        studentData = { name, class: sClass };
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('question-area').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        const progress = ((currentIdx) / questions.length) * 100;
        
        document.getElementById('progress-bar').style.width = `${progress}%`;
        document.getElementById('q-number').innerText = `${currentIdx + 1} dari ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        
        const optArea = document.getElementById('options-area');
        optArea.innerHTML = "";

        q.opt.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "btn btn-option animate__animated animate__fadeInUp";
            btn.innerText = o;
            btn.onclick = () => nextQuestion(o);
            optArea.appendChild(btn);
        });
    }

    function nextQuestion(selected) {
        const q = questions[currentIdx];
        
        // Simpan setiap jawaban siswa
        userAnswers.push(selected);

        // Hitung skor hanya untuk tipe IQ
        if (q.type === "IQ" && selected === q.ans) {
            scoreIQ += 20; // Sesuaikan bobot skor (misal: 1 soal = 20 poin)
        }

        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('question-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        
        // Panggil fungsi kirim data
        sendToGoogleSheets();
    }

    async function sendToGoogleSheets() {
        // URL WEB APP BAPAK
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxpP1ugmM0GnIPj8vQbjFaLKWvYvowYYN5X7fpzxvXRL6HEAZi4cDq_9ZUE00MvZazR/exec';
        
        const payload = {
            name: studentData.name,
            class: studentData.class,
            score: scoreIQ,
            allAnswers: userAnswers
        };

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Penting untuk Apps Script
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Update UI jika berhasil
            document.getElementById('loading-status').innerHTML = "<b>Status: Data Tersimpan di Database Sekolah.</b>";
            console.log("Kirim Data Berhasil!");
        } catch (error) {
            console.error('Error!', error.message);
            document.getElementById('loading-status').innerHTML = "<b class='text-danger'>Status: Koneksi Gagal, Hubungi Guru.</b>";
        }
    }
</script>

</body>
</html>
