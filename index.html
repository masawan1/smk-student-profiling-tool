<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK Potensi - Assessment Tool</title>
    <!-- CSS: Bootstrap + Google Fonts + Animate.css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; color: #333; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-option { 
            padding: 15px; text-align: left; border-radius: 12px; 
            transition: 0.3s; border: 2px solid #e9ecef; margin-bottom: 10px;
        }
        .btn-option:hover { background-color: #e7f1ff; border-color: #0d6efd; transform: translateY(-2px); }
        .progress { height: 8px; border-radius: 10px; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Header -->
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">SMK POTENSI</h2>
                <p class="text-muted">Kenali Dirimu, Tentukan Masa Depanmu</p>
            </div>

            <div class="card p-4 animate__animated animate__fadeIn">
                <!-- 1. FORM DATA DIRI -->
                <div id="setup-area">
                    <h5 class="mb-3">Informasi Siswa</h5>
                    <input type="text" id="student-name" class="form-control form-control-lg mb-3" placeholder="Nama Lengkap">
                    <select id="student-class" class="form-select form-select-lg mb-4">
                        <option value="">Pilih Kelas...</option>
                        <option value="10-PPLG">10 PPLG</option>
                        <option value="10-DKV">10 DKV</option>
                        <option value="10-Broadcasting">10 Broadcasting</option>
                    </select>
                    <button class="btn btn-primary btn-lg w-100" onclick="startQuiz()">Mulai Tes Sekarang</button>
                </div>

                <!-- 2. AREA TEST -->
                <div id="question-area" class="hidden">
                    <div class="progress">
                        <div id="progress-bar" class="progress-bar bg-primary" style="width: 0%"></div>
                    </div>
                    <p class="text-muted small">Pertanyaan <span id="q-number">1</span></p>
                    <h4 id="question-text" class="mb-4 fw-600"></h4>
                    <div id="options-area" class="d-grid"></div>
                </div>

                <!-- 3. AREA HASIL -->
                <div id="result-area" class="hidden text-center animate__animated animate__bounceIn">
                    <div class="mb-3">🎉</div>
                    <h4>Tes Selesai!</h4>
                    <div class="display-5 fw-bold text-primary my-3" id="score-display">0</div>
                    <p class="lead" id="desc-display"></p>
                    <hr>
                    <p class="small text-muted">Data Anda sedang dikirim ke database sekolah...</p>
                    <button class="btn btn-outline-primary mt-3" onclick="location.reload()">Selesai & Keluar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "Pola angka: 3, 6, 12, ... Berapakah angka selanjutnya?", opt: ["18", "24", "30", "36"], ans: "24", type: "IQ" },
        { q: "Saya lebih suka merancang visual daripada menulis kode program.", opt: ["Sangat Setuju", "Setuju", "Ragu-ragu", "Tidak Setuju"], type: "Karakter", cat: "Visual" },
        { q: "Jika semua mawar adalah bunga, dan sebagian bunga layu, maka semua mawar pasti layu.", opt: ["Benar", "Salah"], ans: "Salah", type: "IQ" }
    ];

    let currentIdx = 0;
    let scoreIQ = 0;
    let studentData = {};

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        const sClass = document.getElementById('student-class').value;
        if(!name || !sClass) return alert("Lengkapi data dulu ya!");
        
        studentData = { name, class: sClass };
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('question-area').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        const progress = ((currentIdx) / questions.length) * 100;
        
        document.getElementById('progress-bar').style.width = `${progress}%`;
        document.getElementById('q-number').innerText = `${currentIdx + 1} dari ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        
        const optArea = document.getElementById('options-area');
        optArea.innerHTML = "";

        q.opt.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "btn btn-option animate__animated animate__fadeInUp";
            btn.innerText = o;
            btn.onclick = () => nextQuestion(o);
            optArea.appendChild(btn);
        });
    }

    function nextQuestion(selected) {
        const q = questions[currentIdx];
        if (q.type === "IQ" && selected === q.ans) scoreIQ += 10;

        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('question-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        document.getElementById('score-display').innerText = `Skor: ${scoreIQ}`;
        document.getElementById('desc-display').innerText = `Terima kasih, ${studentData.name}. Hasil tesmu telah tersimpan.`;
        
        // DISINI KITA AKAN PANGGIL FUNGSI KIRIM DATA KE GOOGLE SHEETS
        sendToGoogleSheets();
    }

    function sendToGoogleSheets() {
        // Ini placeholder, kita akan isi setelah membuat Apps Script
        console.log("Mengirim data...", studentData, "Skor:", scoreIQ);
    }
</script>
</body>
</html>
